name: Deploy Desktop to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm install --include=optional

      - name: Install desktop deps
        run: npm install --include=optional
        working-directory: desktop

      - name: Install Linux native bindings
        run: npm install --no-save --include=optional @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu
        working-directory: desktop

      - name: Build desktop
        run: npx tsc -b && npx vite build
        working-directory: desktop

      - uses: actions/upload-pages-artifact@v3
        with:
          path: desktop/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
